name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true

      - name: gofmt check
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt issues in: $out"
            exit 1
          fi

      - name: go vet (windows target)
        env:
          GOOS: windows
          CGO_ENABLED: 0
        run: go vet ./...

      - name: go test (cross-platform packages)
        env:
          CGO_ENABLED: 0
        run: go test ./config/... ./dns/... ./tui/...

      - name: build windows/amd64
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
        run: go build -trimpath -o /dev/null .
