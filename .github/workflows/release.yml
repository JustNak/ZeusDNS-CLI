name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true

      - name: Determine version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: go vet (windows target)
        env:
          GOOS: windows
          CGO_ENABLED: 0
        run: go vet ./...

      - name: Run tests (cross-platform packages)
        env:
          CGO_ENABLED: 0
        run: go test ./config/... ./dns/... ./tui/...

      # Pure-Go project (CGO_ENABLED=0) cross-compiles to Windows from Linux.
      - name: Build windows/amd64
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          # -s -w strips the symbol table + DWARF from the release binary
          # (~3-4MB smaller); dev `go build` keeps symbols for debugging.
          go build -trimpath -ldflags "-s -w -X github.com/JustNak/ZeusDNS-CLI/cmd.Version=${{ steps.ver.outputs.version }}" -o zeusdns.exe .
          zip -j zeusdns_${{ steps.ver.outputs.version }}_windows_amd64.zip zeusdns.exe

      - name: Build windows/arm64
        env:
          GOOS: windows
          GOARCH: arm64
          CGO_ENABLED: 0
        run: |
          rm -f zeusdns.exe
          go build -trimpath -ldflags "-s -w -X github.com/JustNak/ZeusDNS-CLI/cmd.Version=${{ steps.ver.outputs.version }}" -o zeusdns.exe .
          zip -j zeusdns_${{ steps.ver.outputs.version }}_windows_arm64.zip zeusdns.exe

      # Minisign signing: signs each release zip with the owner's private key
      # (stored as a GitHub Encrypted Secret MINISIGN_PRIVATE_KEY). The .minisig
      # files are uploaded alongside the zips and verified at update time
      # against the embedded public key in updater/minisign.go.
      # This step is skipped if the secret is not set (e.g. PRs from forks),
      # but the updater will refuse to install unsigned binaries unless the
      # embedded pubkey is configured. See updater/KEYGEN.md.
      - name: Sign artifacts with minisign
        if: ${{ secrets.MINISIGN_PRIVATE_KEY != '' }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq minisign
          printf '%s' "${{ secrets.MINISIGN_PRIVATE_KEY }}" > /tmp/minisign.key
          minisign -S -m zeusdns_${{ steps.ver.outputs.version }}_windows_amd64.zip -s /tmp/minisign.key
          minisign -S -m zeusdns_${{ steps.ver.outputs.version }}_windows_arm64.zip -s /tmp/minisign.key
          rm -f /tmp/minisign.key

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Build the file list conditionally to include .minisig files
          # when signing was performed and the files exist.
          base="zeusdns_${{ steps.ver.outputs.version }}_windows"
          files=("${base}_amd64.zip" "${base}_arm64.zip")
          for sig in "${base}_amd64.zip.minisig" "${base}_arm64.zip.minisig"; do
            [ -f "$sig" ] && files+=("$sig")
          done
          gh release create "$GITHUB_REF_NAME" "${files[@]}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
